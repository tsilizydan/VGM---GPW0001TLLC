<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance — Vanilla Groupe Madagascar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .font-playfair { font-family: 'Playfair Display', Georgia, serif; }
        .font-inter { font-family: 'Inter', system-ui, sans-serif; }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .pulse-soft { animation: pulse-soft 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .float { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="font-inter bg-gradient-to-br from-amber-50 via-orange-50 to-yellow-50 min-h-screen flex items-center justify-center p-4">
    <!-- Top accent bar -->
    <div class="fixed top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-amber-900 via-yellow-600 to-green-800 z-50"></div>

    <div class="max-w-lg text-center">
        <!-- Logo / Icon -->
        <div class="float mb-8">
            <div class="inline-flex items-center justify-center w-24 h-24 bg-gradient-to-br from-amber-800 to-amber-600 rounded-3xl shadow-2xl shadow-amber-200">
                <span class="text-5xl">🌿</span>
            </div>
        </div>

        <!-- Brand -->
        <h1 class="font-playfair text-3xl md:text-4xl font-bold text-amber-900 mb-3">
            Vanilla Groupe Madagascar
        </h1>

        <!-- Status badge -->
        <div class="inline-flex items-center gap-2 bg-amber-100/80 backdrop-blur border border-amber-200 rounded-full px-4 py-2 mb-6">
            <span class="w-2 h-2 bg-amber-500 rounded-full pulse-soft"></span>
            <span class="text-amber-800 text-sm font-medium">Maintenance en cours</span>
        </div>

        <!-- Message -->
        <p class="text-amber-700 text-lg leading-relaxed mb-2">
            Nous améliorons votre expérience.
        </p>
        <p class="text-amber-600/80 text-base leading-relaxed mb-8">
            Notre site revient très bientôt avec de nouvelles fonctionnalités.<br>
            Merci pour votre patience ! 🙏
        </p>

        <!-- Contact -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-3 mb-8">
            <a href="https://wa.me/261340000000" target="_blank"
               class="inline-flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-full font-semibold transition-all hover:scale-105 shadow-lg shadow-green-200">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                WhatsApp
            </a>
            <a href="mailto:contact@vanillagroupe.mg"
               class="inline-flex items-center gap-2 bg-amber-800 hover:bg-amber-900 text-white px-6 py-3 rounded-full font-semibold transition-all hover:scale-105 shadow-lg shadow-amber-200">
                ✉️ Email
            </a>
        </div>

        <!-- Timer hint -->
        <p class="text-amber-500/60 text-xs">
            Temps estimé : quelques minutes • <span id="clock"></span>
        </p>
    </div>

    <script>
        function tick() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-MG');
        }
        tick(); setInterval(tick, 1000);
    </script>
</body>
</html>
